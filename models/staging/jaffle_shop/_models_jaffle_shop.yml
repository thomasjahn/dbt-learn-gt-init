models:
  - name: stg_jaffle_shop__customers
    description: One record per customer
    columns:
      - name: customer_id
        description: Primary Key 
        data_tests:
          - unique
          - not_null


  - name: stg_jaffle_shop__orders
    description: One record per order
    columns:
      - name: order_id
        data_tests:
          - unique
          - not_null

      - name: status
        description: "{{doc('order_status')}}"
        data_tests:
          - accepted_values:
              arguments:

                values:
                  - placed
                  - shipped
                  - return_pending
                  - returned
                  - completed
                  


